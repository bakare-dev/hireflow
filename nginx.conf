server {
    listen 80;

    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # nginx:alpine's default mime.types doesn't know about .mjs/.wasm. Without
    # these overrides they're served as application/octet-stream and strict
    # MIME checking blocks them as module scripts (e.g. the PDF.js worker).
    # Using `default_type` per-extension avoids redefining the global types
    # table (a `types {}` block at server level would replace it entirely).
    location ~* \.mjs$ {
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location ~* \.wasm$ {
        default_type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Hashed Vite assets are immutable — cache them aggressively.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
