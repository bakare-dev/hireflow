<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Light gradient for use on dark backgrounds:
         soft sky → bright cyan, keeping the diagonal "flow" direction -->
    <linearGradient id="hfGradientLight" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>

    <!-- Accent gradient stays vibrant — pops against both light & dark bg -->
    <linearGradient id="flowAccentLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Subtle cyan glow instead of dark shadow, so it lifts on dark bg -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feFlood flood-color="#06B6D4" flood-opacity="0.35"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Logo group with glow -->
  <g filter="url(#softGlow)">
    <!-- Shared central spine -->
    <rect x="100" y="20" width="20" height="200" rx="4" fill="url(#hfGradientLight)"/>

    <!-- H left vertical -->
    <rect x="40" y="20" width="20" height="200" rx="4" fill="url(#hfGradientLight)"/>

    <!-- H middle connector -->
    <rect x="40" y="100" width="80" height="20" rx="4" fill="url(#hfGradientLight)"/>

    <!-- F top bar -->
    <rect x="100" y="40" width="80" height="20" rx="4" fill="url(#hfGradientLight)"/>

    <!-- F middle bar -->
    <rect x="100" y="100" width="60" height="20" rx="4" fill="url(#hfGradientLight)"/>
  </g>

  <!-- Flow accent: dynamic streak through the F arm -->
  <g opacity="0.95">
    <path d="M 168 52 L 200 36 L 196 60 L 172 68 Z"
          fill="url(#flowAccentLight)"/>
    <circle cx="206" cy="40" r="5" fill="#06B6D4"/>
  </g>

  <!-- Subtle accent dot anchoring the H -->
  <circle cx="50" cy="220" r="4" fill="#06B6D4" opacity="0.95"/>
</svg>
